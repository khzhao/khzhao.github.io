{{- if .Store.Get "hasMermaid" -}}
<style>
  pre.mermaid {
    background: transparent;
    border: none;
    margin: 1.5em auto;
    padding: 0;
    overflow-x: auto;
    text-align: center;
  }
  pre.mermaid svg {
    max-width: 100%;
    height: auto;
  }
</style>
<script type="module">
  import mermaid from "https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs";
  mermaid.initialize({
    startOnLoad: true,
    theme: "neutral",
    flowchart: { curve: "basis", padding: 16, htmlLabels: true },
  });
</script>
{{- end -}}
