baseURL = 'https://khzhao.github.io'
locale = 'en-us'
title = "KZ's Brain Dump"
theme = 'hugo-bearblog'

# Giscus comments (GitHub Discussions). Fill in repoId and categoryId from
# https://giscus.app after enabling Discussions and installing the giscus app.
# Comments stay hidden until both IDs below are set.
[params.giscus]
  repo = "khzhao/khzhao.github.io"
  repoId = "R_kgDOOOsY-w"
  category = "Announcements"
  categoryId = "DIC_kwDOOOsY-84C-q94"
  mapping = "pathname"
  # Built-in light theme (has visible borders so it stands out from the page).
  # Works locally and in prod with no external CSS dependency.
  theme = "light"
  inputPosition = "bottom"
  reactionsEnabled = "1"

[caches]
  [caches.images]
    dir = ':cacheDir/images'

# Treat LaTeX inside math delimiters as opaque to the Markdown parser, so
# `x_i`, `a*b`, `\\`, etc. survive untouched and reach MathJax verbatim.
# This is the "write LaTeX like Overleaf" switch.
[markup]
  [markup.goldmark]
    [markup.goldmark.extensions]
      [markup.goldmark.extensions.passthrough]
        enable = true
        [markup.goldmark.extensions.passthrough.delimiters]
          block  = [['\[', '\]'], ['$$', '$$']]
          inline = [['\(', '\)'], ['$', '$']]
    [markup.goldmark.renderer]
      # Allow raw HTML inside Markdown (useful for the occasional <br/>,
      # <details>, or hand-written equation environment).
      unsafe = true